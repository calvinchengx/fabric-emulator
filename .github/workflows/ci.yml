name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, vet & tests (incl. e2e vs entra-emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build ./...
      # The server tests start a real entra-emulator in-process and drive the
      # full token → JWKS → RBAC → LRO path over HTTP.
      - run: go test -coverpkg=./... -coverprofile=cover.out ./...
      - name: Coverage summary
        run: go tool cover -func=cover.out | tail -1
