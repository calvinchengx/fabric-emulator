name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, vet & tests (incl. e2e vs entra-emulator)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build ./...
      # The server tests start a real entra-emulator in-process and drive the
      # full token → JWKS → RBAC → LRO path over HTTP.
      # shell: bash keeps the coverage profile and the floor step below in
      # the same shell semantics on the Windows runner (pwsh vs Git Bash).
      - run: go test -coverpkg=./... -coverprofile=cover.out ./...
        shell: bash
      # Coverage floor: fail the build if total statement coverage regresses
      # below 90% (currently ~95%).
      - name: Coverage floor (90%)
        shell: bash
        run: |
          total=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t < 90) ? 1 : 0 }'

  portal:
    name: Portal builds from source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter fabric-emulator-portal test
      - run: pnpm --filter fabric-emulator-portal build
      # portal/dist is committed (go:embed bakes it into the binary so `go build`
      # / `go install @latest` need no Node). Fail if the committed copy has
      # drifted from a fresh build so it can never go stale.
      - name: Verify committed portal/dist is up to date
        run: |
          changes="$(git status --porcelain -- portal/dist)"
          if [ -n "$changes" ]; then
            echo "::error::portal/dist is stale. Run 'pnpm --filter fabric-emulator-portal build' and commit portal/dist."
            echo "$changes"
            exit 1
          fi
      # Headless mount smoke: `vite build` + jsdom unit tests pass even when the
      # bundle resolves Svelte to its server build and never mounts. Only a real
      # browser catches that, so assert the built dist actually renders.
      - run: pnpm --filter fabric-emulator-portal exec playwright install --with-deps chromium
      - run: pnpm --filter fabric-emulator-portal smoke

  fabric-cicd:
    name: Real fabric-cicd tool publishes into the emulator
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Self-contained: starts entra-emulator (go install) + fabric-emulator,
      # installs fabric-cicd in a venv, publishes a notebook repo, and
      # verifies the definition round-trips (idempotently).
      - run: python e2e/fabric-cicd/run.py

  delta-rs:
    name: Real delta-rs writes Delta through OneLake
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Starts entra-emulator + fabric-emulator, then the real `deltalake`
      # (delta-rs) engine writes and reads a Delta table through the OneLake
      # Blob surface with an entra-minted Storage token — exercising Range
      # reads and the _delta_log put-if-absent commit primitive.
      - run: python e2e/delta-rs/run.py

  adls-sdk:
    name: Real Azure Blob SDK round-trips through OneLake
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Microsoft's real `azure-storage-blob` SDK uploads a pyarrow-written
      # Parquet, downloads it byte-identical (exercising x-ms-range), lists
      # blobs, and the DFS surface sees the same file — the ADLS SDK oracle.
      - run: python e2e/adls-sdk/run.py

  azcopy:
    name: Real azcopy transfers through OneLake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Microsoft's real `azcopy` binary uploads a multi-block file (Put Block +
      # Put Block List), downloads it byte-identical, and the DFS surface sees
      # the same object. Linux-only: azcopy (a Go binary) trusts the emulator's
      # self-signed CA via SSL_CERT_FILE, which the macOS system verifier rejects
      # for the dev cert's >825-day validity.
      - run: python3 e2e/azcopy/run.py

  docker-smoke:
    name: Production image runs and persists (container smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Builds the distroless image and runs it with a persistent volume,
      # asserting the nonroot user opens its SQLite DB and writes state to
      # the volume — the container path nothing else in CI exercised.
      - run: ./scripts/docker-smoke.sh

  spark-a2:
    name: Real Spark writes Delta via ABFS (containerized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Heavy: builds fabric-emulator from source + a JVM Spark image, then
      # real delta-spark writes/reads a Delta table through the OneLake ABFS
      # surface (container network so onelake.dfs.* resolves to the emulator).
      # Linux-only — the JVM/Docker stack is a different weight class.
      - run: python3 e2e/spark/run.py

  livy-native:
    name: Native Livy sessions drive real Spark (containerized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The emulator terminates the Livy REST protocol itself and drives a Spark
      # statement-executor agent — a real client creates a session, submits
      # PySpark statements, and gets results computed by real Spark, with NO
      # Apache Livy server. Linux-only (JVM Spark image), like spark-a2.
      - run: python3 e2e/livy/run.py

  dbt-fabricspark:
    name: Microsoft's dbt-fabricspark drives Livy HC on real Spark (containerized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Microsoft's real dbt-fabricspark adapter runs a dbt project (debug ->
      # seed -> run -> test) against the emulator's Fabric REST + Livy
      # High-Concurrency surface, with real Spark computing the models and an
      # Entra token minted by entra-emulator. A second, independent client over
      # the Livy HC layer — parity witness. Linux-only (JVM Spark image).
      - run: python3 e2e/dbt-fabricspark/run.py

  dbt-fabric:
    name: Microsoft's dbt-fabric drives the TDS warehouse via ODBC Driver 18 (containerized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Microsoft's real dbt-fabric adapter runs a dbt project (debug -> seed ->
      # run -> test) against the emulator's TDS warehouse surface through the
      # Microsoft ODBC Driver 18 + FedAuth (token minted by entra-emulator),
      # byte-spliced to a real SQL Server sidecar. The second, independent TDS
      # driver witness (go-mssqldb is the first). Linux-only (SQL Server image).
      - run: python3 e2e/dbt-fabric/run.py

  duckdb:
    name: Real DuckDB SQL over lakehouse Delta
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Real DuckDB runs SQL (aggregation, join, filter) over Delta tables in
      # the OneLake plane — the lakehouse SQL-analytics-endpoint semantics.
      - run: python e2e/duckdb/run.py

  notebookutils:
    name: notebookutils shim drives the family (notebook loop)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Brings up entra + fabric + azure-keyvault and runs a real Fabric
      # notebook that drives the functional notebookutils shim: fs over
      # OneLake, credential tokens, Key Vault secret brokering, lakehouse
      # control plane, and notebook.run — the notebook developer loop.
      - run: python e2e/notebookutils/run.py

  notebook-run:
    name: Real Spark executes notebook cells (containerized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Heavy (reuses the spark-a2 JVM image): the emulator parses a real Fabric
      # notebook into cells, real Spark executes them against OneLake (a Delta
      # table lands), and the run is reported back so the RunNotebook job
      # reflects real execution. Linux-only.
      - run: python3 e2e/notebook-run/run.py

  warehouse-tds:
    name: Real SQL Server relay through the TDS endpoint
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Str0ng!Passw0rd"
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      # entra-emulator runs in-process (a go.mod dependency); fabric's SQL/TDS
      # endpoint points at the SQL Server service, then a real go-mssqldb client
      # connects with an entra token and runs DDL + DML + a GROUP BY through the
      # emulator — the FedAuth login is terminated here, the T-SQL runs on the
      # real engine. Linux-only (SQL Server is a container weight class).
      - name: Real SQL Server relay + Delta-reflection e2e
        env:
          WAREHOUSE_MSSQL_DSN: "server=localhost;user id=sa;password=Str0ng!Passw0rd;encrypt=disable"
        run: go test ./internal/server/ -run TestWarehouse -v -count=1

  semantic-model:
    name: Real DAX over a semantic model (executeQueries)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Publishes the golden TMSL model as a SemanticModel item and runs the
      # DAX golden queries through the executeQueries endpoint (real Power BI
      # audience token), asserting the rows match the hand-computed oracle.
      - run: python e2e/semantic-model/run.py

  great-expectations:
    name: Real Great Expectations validates semantic-model data
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # The SemPy/GX tutorial's subject: real great_expectations validates the
      # emulator's executeQueries results — Store/Measure suites pass, the YoY
      # ratio DAX asset fails (out of band), mirroring the tutorial.
      - run: python e2e/great-expectations/run.py
