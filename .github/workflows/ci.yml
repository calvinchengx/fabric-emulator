name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, vet & tests (incl. e2e vs entra-emulator)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build ./...
      # The server tests start a real entra-emulator in-process and drive the
      # full token → JWKS → RBAC → LRO path over HTTP.
      # shell: bash keeps the coverage profile and the floor step below in
      # the same shell semantics on the Windows runner (pwsh vs Git Bash).
      - run: go test -coverpkg=./... -coverprofile=cover.out ./...
        shell: bash
      # Coverage floor: fail the build if total statement coverage regresses
      # below 90% (currently ~95%).
      - name: Coverage floor (90%)
        shell: bash
        run: |
          total=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t < 90) ? 1 : 0 }'

  fabric-cicd:
    name: Real fabric-cicd tool publishes into the emulator
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Self-contained: starts entra-emulator (go install) + fabric-emulator,
      # installs fabric-cicd in a venv, publishes a notebook repo, and
      # verifies the definition round-trips (idempotently).
      - run: python e2e/fabric-cicd/run.py

  delta-rs:
    name: Real delta-rs writes Delta through OneLake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Starts entra-emulator + fabric-emulator, then the real `deltalake`
      # (delta-rs) engine writes and reads a Delta table through the OneLake
      # Blob surface with an entra-minted Storage token — exercising Range
      # reads and the _delta_log put-if-absent commit primitive.
      - run: ./e2e/delta-rs/run.sh
