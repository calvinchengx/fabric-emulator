# Auto-loaded alongside docker-compose.yml by `docker compose up` (Compose
# merges *.override.yml automatically when present — no -f flag needed): adds
# REAL engines to the default experience — a Spark statement-executor agent for
# native Livy sessions + notebook cell execution, and a SQL Server sidecar for
# the T-SQL/TDS warehouse surface (Warehouse, Lakehouse SQL endpoint, Fabric SQL
# Database) — so `docker compose up` gives you the emulator with real compute
# attached, not just the contract. See docs/14-real-compute.md.
#
# Opt out — the lite, contract-only pair (no heavy sidecars, honest 501s on the
# Spark/SQL surfaces), by naming the base file explicitly so Compose skips this
# override:
#   docker compose -f docker-compose.yml up
#
# Local dev-only credentials below (not for anything internet-facing).
services:
  # One long-lived SparkSession, a REPL over HTTP — the emulator terminates the
  # Livy REST protocol itself and drives this agent (no Apache Livy server; it's
  # retired). See e2e/livy/agent.py.
  spark-agent:
    image: apache/spark:3.5.3
    volumes:
      - ./e2e/livy/agent.py:/opt/spark/work-dir/agent.py:ro
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - "local[2]"
      - /opt/spark/work-dir/agent.py
      - "8099"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng!Passw0rd"
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - "Str0ng!Passw0rd"
        - -C
        - -Q
        - "SELECT 1"
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  fabric-emulator:
    environment:
      # Native Livy: terminate the protocol and drive the agent above — real
      # interactive sessions, notebook cell execution, high-concurrency REPLs.
      FABRIC_SPARK_AGENT_URL: "http://spark-agent:8099"
      # The T-SQL/TDS warehouse surface, relaying to the SQL Server sidecar
      # above. Generous dial/connection timeouts: the backend dials lazily on
      # first query, and the sidecar (esp. an amd64 image emulated on arm64)
      # can take a while to finish booting.
      FABRIC_SQL_TDS_ADDR: ":1433"
      FABRIC_WAREHOUSE_SQL_URL: "server=sqlserver;user id=sa;password=Str0ng!Passw0rd;encrypt=disable;dial timeout=90;connection timeout=90"
    # Restate the base port mapping alongside the new one — Compose replaces
    # (not merges) list-typed fields like `ports` across files, so the full
    # desired list must be given here.
    ports:
      - "9443:9443" # api.fabric + onelake.dfs + portal (host-routed)
      - "1433:1433" # warehouse T-SQL/TDS (FedAuth; sqlcmd/pyodbc/dbt-fabric point here)
