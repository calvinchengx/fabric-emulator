# Brings up the emulator pair: entra-emulator issues tokens, fabric-emulator
# validates them against entra's JWKS — the same trust relationship as real
# Fabric ↔ Entra. Point FABRIC_ENTRA_ISSUER at a real tenant instead and
# nothing else changes.
#
# Issuer alignment matters: tokens carry iss = <entra login origin>/<tenant>/v2.0,
# so entra must ADVERTISE the origin fabric validates against. On the compose
# network that origin is https://entra-emulator:8443, hence PUBLIC_ORIGIN below.
services:
  entra-emulator:
    image: ghcr.io/calvinchengx/entra-emulator:latest
    environment:
      ORIGIN_MODE: compat # single origin, path-prefixed surfaces
      PUBLIC_ORIGIN: "https://entra-emulator:8443"
    ports:
      - "8443:8443" # login / graph / discovery (JWKS)
    healthcheck:
      test: ["CMD", "/usr/local/bin/entra-emulator", "healthcheck"]
      interval: 5s
      timeout: 2s
      retries: 10

  fabric-emulator:
    image: ghcr.io/calvinchengx/fabric-emulator:latest
    depends_on:
      entra-emulator:
        condition: service_healthy
    ports:
      - "9443:9443" # api.fabric + onelake.dfs + portal (host-routed)
    environment:
      # Must equal the iss entra advertises (see PUBLIC_ORIGIN above).
      # 11111111-… is entra-emulator's default seeded tenant.
      FABRIC_ENTRA_ISSUER: "https://entra-emulator:8443/11111111-1111-1111-1111-111111111111/v2.0"
      FABRIC_ENTRA_JWKS_URL: "https://entra-emulator:8443/11111111-1111-1111-1111-111111111111/discovery/v2.0/keys"
      # Trust entra-emulator's self-signed cert on the internal network.
      FABRIC_ENTRA_TLS_INSECURE: "true"
